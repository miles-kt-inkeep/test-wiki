# Open Knowledge — workspace configuration
#
# This file overrides built-in defaults for this workspace. Every key below
# is commented out and shows its current default value. Uncomment any key
# to override it.
#
# Precedence (lowest -> highest):
#   Built-in defaults
#     -> ~/.open-knowledge/config.yml         (user defaults)
#     -> ./.open-knowledge/config.yml         (this file)
#
# Schema reference: packages/cli/src/config/schema.ts

# --- Content ---------------------------------------------------------------
# dir: where the CRDT editor reads/writes documents. Relative to the project
# root (the directory containing .open-knowledge/), NOT to this file.
#
# include/exclude: glob patterns for tracked content files. Relative to the
# content directory (content.dir).
#
# content:
#   dir: .
#   include:
#     - "**/*.md"
#   exclude: []

# --- Suggested lifecycle (optional pattern) --------------------------------
# Projects that want an explicit knowledge-maturation flow can organize as
# three tiers *relative to the content directory* — create the subfolders
# only when you need them:
#
#   1. external-sources/  — raw content fetched from URLs, PDFs. No analysis,
#                           just preservation. Use the `ingest` MCP tool.
#   2. research/          — analysis and synthesis. Provisional findings,
#                           trade-offs, open questions. Use the `research`
#                           MCP tool.
#   3. articles/          — canonical knowledge. Use the `consolidate` MCP
#                           tool to promote research -> articles once
#                           decisions are made.
#
# This is a pattern, not a requirement. Projects with existing layouts
# (`specs/`, `reports/`, `docs/`, etc.) should use those; the lifecycle
# exists as mental scaffolding, not as enforced filesystem structure.

# --- Server ----------------------------------------------------------------
# HTTP/WebSocket listener for the Hocuspocus server + static React app.
#
# openOnAgentEdit: when true, the browser opens automatically the first time
# an agent writes to the knowledge base in this server session. Debounced to
# one open per boot. Useful for pairing with Claude Code — you see the edit
# land live. Leave false for headless/CI.
#
# server:
#   port: 3000
#   host: localhost
#   openOnAgentEdit: false

# --- Persistence -----------------------------------------------------------
# How aggressively CRDT updates are flushed to disk.
# persistence:
#   debounceMs: 2000
#   maxDebounceMs: 10000

# --- Folders: per-folder frontmatter defaults -------------------------------
#
# TL;DR glob gotcha: `**` is ONLY a multi-segment wildcard when it is a
# standalone path segment. `foo-**` behaves like `foo-*` (single segment, NOT
# descendants). Use `foo/**` or `foo-*/**` to match descendants.
#
# Declare title/description/tags defaults keyed by glob `match:`. Rules merge
# with a file's own frontmatter at read time:
#   - Per scalar (title, description): the FILE wins when declared; folder
#     rule fills in blanks.
#   - Tags: concatenated across ALL matching rules (in declaration order) with
#     file tags last; first-occurrence preserved on dedup.
#   - Evaluation is positional — LATER rules in this array override earlier
#     rules for scalars. Put general rules first, specific rules last.
#
# Picomatch glob cheatsheet:
#   `match: 'foo'`         — matches ONLY the folder `foo` itself
#   `match: 'foo/**'`      — matches `foo` AND all descendants (files + dirs)
#   `match: 'foo-*'`       — matches `foo-1`, `foo-bar` (single segment)
#   `match: 'foo-**'`      — behaves like `foo-*` (NOT multi-segment); see
#                              TL;DR above. Use `foo-*/**` if you want
#                              `foo-X` plus its descendants.
#
# Tip: run `ok seed` to scaffold the Karpathy three-layer starter
# (external-sources/, research/, articles/) with matching `folders:` entries.
# The commented example below is the exact structure `ok seed` writes.
#
# Example:
# folders:
#   - match: 'external-sources/**'
#     frontmatter:
#       title: External Sources
#       description: Raw preserved sources (URLs, PDFs, files). Immutable — captured verbatim via `ingest`. No analysis in these files; takeaways belong in `research/`.
#       tags: [source, immutable, layer-ingest]
#   - match: 'research/**'
#     frontmatter:
#       title: Research
#       description: Provisional analysis synthesizing external sources. Produced by the `research` tool. Promote to `articles/` via `consolidate` when the team decides.
#       tags: [research, provisional, layer-research]
#   - match: 'articles/**'
#     frontmatter:
#       title: Articles
#       description: Canonical knowledge committed after a team decision. Produced by the `consolidate` tool with a `supersedes:` chain tying back to the research that preceded it.
#       tags: [article, canonical, layer-consolidate]

folders:
  - match: external-sources/**
    frontmatter:
      title: External Sources
      description: "Raw sources SAVED verbatim — not just cited. The actual fetched
        text of URLs, extracted text of PDFs, and copies of any referenced files
        live as .md files here, each with frontmatter carrying the original URL,
        access date, and any publisher / author metadata. Produced by `ingest` —
        applies whether the user shared the URL OR the agent fetched it itself
        to ground a knowledge-base claim. The KB is closed-loop: downstream docs
        cite local paths in this folder, never bare web URLs. Immutable after
        capture (update only to refresh a stale fetch). No analysis in these
        files — that belongs in `research/`. Downstream articles cite specific
        docs here by path so every claim is traceable to preserved evidence
        rather than a dead link."
      tags:
        - source
        - immutable
        - layer-ingest
  - match: research/**
    frontmatter:
      title: Research
      description: "Provisional analysis synthesizing external sources. Produced by
        the `research` tool. Every factual claim cites a specific doc in
        `external-sources/` (or an inline URL if ingest was skipped) — no
        unsourced assertions. Each article has `status: provisional` and a
        `sources:` frontmatter list of cited paths. Promoted to `articles/` via
        `consolidate` once the team decides the findings are stable."
      tags:
        - research
        - provisional
        - layer-research
  - match: articles/**
    frontmatter:
      title: Articles
      description: "Canonical knowledge committed after a team decision. Produced by
        `consolidate`. Carries `status: canonical` plus a `supersedes:` chain
        tying back to the `research/` docs it replaces, which in turn cite
        `external-sources/` — the full evidence chain is traceable without
        leaving the repo. Source-of-truth for the domain; update only when a new
        decision supersedes it."
      tags:
        - article
        - canonical
        - layer-consolidate
  - match: genres/**
    frontmatter:
      description: "Manhattan music genre folders — each genre is its own folder
        containing an `overview.md` (the canonical genre article) and an
        optional `artists/` subfolder holding the bands and performers most
        identified with that genre. Cross-links to venues/ and neighborhoods/
        for navigation."
      tags:
        - manhattan-music-wiki
        - genre
  - match: genres/*/artists/**
    frontmatter:
      description: "Artist and band articles, nested inside their primary genre
        folder. Covers formation, signature work, venue residencies, and scene
        context. Cross-links to other genres/, venues/, and neighborhoods/."
      tags:
        - manhattan-music-wiki
        - artist
  - match: neighborhoods/**
    frontmatter:
      description: "Manhattan neighborhood folders — each neighborhood is its own
        folder containing an `overview.md` (the canonical neighborhood article)
        and an optional `venues/` subfolder holding the live-music venues
        physically located in that neighborhood. Cross-links to genres/ and
        artists/."
      tags:
        - manhattan-music-wiki
        - neighborhood
  - match: neighborhoods/*/venues/**
    frontmatter:
      description: "Live-music venue articles, nested inside their primary
        neighborhood folder. Each article covers location, era, scene
        affiliation, and notable performances. Cross-links to genre overviews,
        artists, and other neighborhoods/."
      tags:
        - manhattan-music-wiki
        - venue
